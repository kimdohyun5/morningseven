<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .ball-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            min-height: 60px;
        }

        /* 초기 상태의 빈 원형 틀 */
        .placeholder-ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px dashed #ccc;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ddd;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 실제 번호가 들어가는 공 */
        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: scale(0);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 로또 색상 */
        .color-1 { background: radial-gradient(circle at 30% 30%, #fbc02d, #f57f17); }
        .color-2 { background: radial-gradient(circle at 30% 30%, #0288d1, #01579b); }
        .color-3 { background: radial-gradient(circle at 30% 30%, #e53935, #b71c1c); }
        .color-4 { background: radial-gradient(circle at 30% 30%, #757575, #212121); }
        .color-5 { background: radial-gradient(circle at 30% 30%, #43a047, #1b5e20); }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            width: 100%;
        }

        button:hover { background-color: #357abd; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>행운의 로또 추첨기</h1>
    <div class="subtitle">아래 버튼을 눌러 행운의 번호를 확인하세요!</div>
    
    <div class="ball-container" id="ballBox">
        <div class="placeholder-ball">?</div>
        <div class="placeholder-ball">?</div>
        <div class="placeholder-ball">?</div>
        <div class="placeholder-ball">?</div>
        <div class="placeholder-ball">?</div>
        <div class="placeholder-ball">?</div>
    </div>
    
    <button onclick="generateLotto()">번호 추첨하기</button>
</div>

<script>
    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = ''; // 빈 점선 공들을 싹 지웁니다.

        const numbers = [];
        
        // 중복 없이 6개 추출
        while (numbers.length < 6) {
            const randomNum = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(randomNum)) {
                numbers.push(randomNum);
            }
        }

        // 오름차순 정렬
        numbers.sort((a, b) => a - b);

        // 번호 공 생성 및 화면에 추가
        numbers.forEach((num, index) => {
            const ball = document.createElement('div');
            ball.classList.add('ball');
            
            if (num <= 10) ball.classList.add('color-1');
            else if (num <= 20) ball.classList.add('color-2');
            else if (num <= 30) ball.classList.add('color-3');
            else if (num <= 40) ball.classList.add('color-4');
            else ball.classList.add('color-5');

            ball.innerText = num;
            ball.style.animationDelay = `${index * 0.08}s`; // 통통 튀는 시차 효과
            
            ballBox.appendChild(ball);
        });
    }
</script>

</body>
</html>
